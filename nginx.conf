server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────
# Umami 后台管理子域名（生产环境启用）
# 1. Cloudflare 添加 A 记录: umami.jialiang.dev → 服务器 IP
# 2. 取消下面注释
# ──────────────────────────────────────────
# server {
#     listen 443 ssl;
#     server_name umami.jialiang.dev;
#
#     ssl_certificate /etc/ssl/cloudflare/jialiang.dev.pem;
#     ssl_certificate_key /etc/ssl/cloudflare/jialiang.dev.key;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#
#     location / {
#         proxy_pass http://umami:3000;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#         proxy_set_header X-Forwarded-Host $host;
#     }
# }

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/ssl/cloudflare/jialiang.dev.pem;
    ssl_certificate_key /etc/ssl/cloudflare/jialiang.dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Robots-Tag "index, follow" always;

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket 反向代理
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Umami 跟踪脚本（同源避免广告拦截器拦截）
    location /umami/ {
        proxy_pass http://umami:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # SEO 文件：不缓存、不加版本号
    location = /robots.txt {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /sitemap.xml {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA 路由：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
